<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeadPredictor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="header-left">
          <div class="logo-wrapper">
            <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></div>
            <div class="logo"><span data-i18n="logo">LeadPredictor</span></div>
          </div>
        </div>
        <div class="meta"><span data-i18n="dashboardCalc">Analytics Dashboard</span></div>
      </header>

      <main class="dashboard">
        <section class="panel panel-left">
          <h2 data-i18n="campaignSettings" style="margin-bottom: 20px;">Campaign Settings</h2>
          <div class="field">
            <label for="language"><span class="badge icon-lang">🌐</span> <span data-i18n="language">Language</span></label>
            <div class="custom-select">
              <select id="language">
                <option value="en">🇺🇸 English</option>
                <option value="bg">🇧🇬 Bulgarian</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="campaignStart"><span class="badge icon-cal">📅</span> <span data-i18n="campaignStart">Campaign Start</span></label>
            <input id="campaignStart" type="date" value="2026-05-08" />
          </div>

          <div class="field">
            <label for="campaignEnd"><span class="badge icon-cal">📅</span> <span data-i18n="campaignEnd">Campaign End</span></label>
            <input id="campaignEnd" type="date" value="2026-11-04" />
          </div>

          <div class="field">
            <label for="totalRevenue"><span class="badge icon-rev">💲</span> <span data-i18n="totalRevenue">Total Revenue</span></label>
            <div class="input-with-prefix">
              <span>$</span>
              <input id="totalRevenue" type="number" min="0" step="100" value="10000" />
            </div>
          </div>

          <div class="field">
            <label for="avgOrderValue"><span class="badge icon-aov">🛒</span> <span data-i18n="avgOrderValue">Avg. Order Value</span></label>
            <div class="input-with-prefix">
              <span>$</span>
              <input id="avgOrderValue" type="number" min="0" step="50" value="1000" />
            </div>
          </div>
        </section>

        <section class="panel panel-center">
          <div class="chart-header">
            <h2 data-i18n="forecastOverview">Forecast Overview</h2>
            <p data-i18n="forecastDesc">Monthly distribution based on current targets.</p>
          </div>

          <div class="chart" id="chart">
            <div class="chart-row" data-month="1">
              <span class="chart-label" data-i18n="month1">Month 1</span>
              <div class="chart-bar">
                <div class="bar bar-prospects"></div>
                <div class="bar bar-leads"></div>
                <div class="bar bar-customers"></div>
              </div>
            </div>
            <div class="chart-row" data-month="2">
              <span class="chart-label" data-i18n="month2">Month 2</span>
              <div class="chart-bar">
                <div class="bar bar-prospects"></div>
                <div class="bar bar-leads"></div>
                <div class="bar bar-customers"></div>
              </div>
            </div>
            <div class="chart-row" data-month="3">
              <span class="chart-label" data-i18n="month3">Month 3</span>
              <div class="chart-bar">
                <div class="bar bar-prospects"></div>
                <div class="bar bar-leads"></div>
                <div class="bar bar-customers"></div>
              </div>
            </div>
            <div class="chart-row" data-month="4">
              <span class="chart-label" data-i18n="month4">Month 4</span>
              <div class="chart-bar">
                <div class="bar bar-prospects"></div>
                <div class="bar bar-leads"></div>
                <div class="bar bar-customers"></div>
              </div>
            </div>
            <div class="chart-row" data-month="5">
              <span class="chart-label" data-i18n="month5">Month 5</span>
              <div class="chart-bar">
                <div class="bar bar-prospects"></div>
                <div class="bar bar-leads"></div>
                <div class="bar bar-customers"></div>
              </div>
            </div>
            <div class="chart-row" data-month="6">
              <span class="chart-label" data-i18n="month6">Month 6</span>
              <div class="chart-bar">
                <div class="bar bar-prospects"></div>
                <div class="bar bar-leads"></div>
                <div class="bar bar-customers"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel panel-right">
          <div class="metric-card">
            <div class="metric-title"><span class="badge card-icon-prospects">📁</span> <span data-i18n="prospects">Prospects</span></div>
            <div class="metric-value" id="prospectsValue">125</div>
            <div class="metric-meta" id="prospectsMeta">100%</div>
            <div class="metric-track">
              <div class="metric-fill" id="prospectsFill"></div>
            </div>
          </div>

          <div class="metric-card">
            <div class="metric-title"><span class="badge card-icon-leads">👤</span> <span data-i18n="leads">Leads</span></div>
            <div class="metric-value" id="leadsValue">25</div>
            <div class="metric-meta" id="leadsMeta">20%</div>
            <div class="metric-track">
              <div class="metric-fill" id="leadsFill"></div>
            </div>
          </div>

          <div class="metric-card">
            <div class="metric-title"><span class="badge card-icon-customers">🏆</span> <span data-i18n="customers">Customers</span></div>
            <div class="metric-value" id="customersValue">10</div>
            <div class="metric-meta" id="customersMeta">8%</div>
            <div class="metric-track">
              <div class="metric-fill" id="customersFill"></div>
            </div>
          </div>
        </section>

        <section class="panel panel-bottom">
          <div class="slider-group">
            <div class="slider-header">
              <span><span class="badge icon-blue">⚡</span> <span data-i18n="leadRate">Lead Response Rate</span></span>
              <span id="leadRateValue">40%</span>
            </div>
            <input id="leadRate" type="range" min="1" max="100" value="40" />
          </div>

          <div class="slider-group">
            <div class="slider-header">
              <span><span class="badge icon-purple">✨</span> <span data-i18n="prospectRate">Prospect Response Rate</span></span>
              <span id="prospectRateValue">20%</span>
            </div>
            <input id="prospectRate" type="range" min="1" max="100" value="20" />
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
